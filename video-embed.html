<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SetIQ demo</title>
<style>
  html, body { margin: 0; height: 100%; background: #0F172A; }
  video { display: block; width: 100%; height: 100%; object-fit: cover; background: #0F172A; }
</style>
</head>
<body>
  <video
    src="setiq-demo.mp4"
    controls
    autoplay
    muted
    loop
    playsinline
    preload="auto">
  </video>
  <script>
    /* Belt-and-suspenders: guarantee muted autoplay even if a browser
       is strict about the attribute vs. property. */
    (function () {
      var v = document.querySelector('video');
      if (!v) return;
      v.muted = true;
      v.defaultMuted = true;
      var p = v.play();
      if (p && p.catch) p.catch(function () {});
    })();
  </script>
</body>
</html>
